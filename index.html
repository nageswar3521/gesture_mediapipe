<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gesture → ESP32 Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="container">

    <!-- Help Button -->
    <div id="helpBtn">ⓘ</div>

    <!-- Gesture Guide -->
    <div id="helpPanel">
        <h3>Gesture Guide</h3>
        <ul>
            <li>👍 Thumb Up → Forward</li>
            <li>👎 Thumb Down → Backward</li>
            <li>✋ Open Palm → Stop</li>
            <li>☝️ Pointing Up → Move Left</li>
            <li>✌️ Victory → Move Right</li>
            <li>✊ Fist → Turn Left</li>
            <li>🤟 ILY → Turn Right</li>
        </ul>
    </div>

    <!-- Hidden video -->
    <video id="webcam" autoplay playsinline></video>

    <!-- Canvas -->
    <canvas id="output"></canvas>

    <!-- Status -->
    <div id="status">DISCONNECTED</div>

    <!-- Info Panel -->
    <div id="info">
        <div id="icon">✋</div>
        <div id="gesture">None</div>
        <div id="fps">0 FPS</div>
    </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
