<script type="module">
  import { GestureRecognizer, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

  const video = document.getElementById("webcam");
  const canvasElement = document.getElementById("output_canvas");
  const canvasCtx = canvasElement.getContext("2d");
  const gestureLabel = document.getElementById("gesture-label");
  const wsStatus = document.getElementById("ws-status");

  let gestureRecognizer;
  let socket;
  let lastCommand = "";

  // 1. Connect to ESP32 via WebSocket (STATION MODE UPDATE)
  function initWebSocket() {
    // TIP: Check your Arduino Serial Monitor for the IP address.
    // Replace '192.168.1.XX' with the actual IP address displayed there.
    const espIP = "172.17.135.1"; 
    
    socket = new WebSocket(`ws://${espIP}/ws`);
    
    socket.onopen = () => {
      wsStatus.innerText = `Connected to Bot (${espIP})`;
      wsStatus.className = "status-box connected";
    };
    
    socket.onclose = () => {
      wsStatus.innerText = "Searching for ESP32 on Network...";
      wsStatus.className = "status-box disconnected";
      setTimeout(initWebSocket, 3000);
    };

    socket.onerror = (err) => {
      console.error("WebSocket Error:", err);
    };
  }

  // 2. Setup MediaPipe
  async function setupAI() {
    // Note: This still loads the WASM and Model from the internet/GitHub
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
    );
    
    gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "gesture_recognizer.task", 
        delegate: "GPU"
      },
      runningMode: "VIDEO"
    });
    
    startWebcam();
  }

  function startWebcam() {
    const constraints = { video: { facingMode: "user" } };
    navigator.mediaDevices.getUserMedia(constraints).then((stream) => {
      video.srcObject = stream;
      video.addEventListener("loadeddata", predictLoop);
    });
  }

  // 3. Mapping Table
  const commandMap = {
    "Thumb_Up": "F",
    "Thumb_Down": "B",
    "Pointing_Up": "L",
    "Victory": "R",
    "Closed_Fist": "S",
    "ILoveYou": "TL",
    "Open_Palm": "TR"
  };

  async function predictLoop() {
    canvasElement.width = video.videoWidth;
    canvasElement.height = video.videoHeight;

    // Fixed: recognizeForVideo needs the video element directly
    const results = gestureRecognizer.recognizeForVideo(video, Date.now());

    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

    if (results.gestures.length > 0) {
      const gesture = results.gestures[0][0].categoryName;
      gestureLabel.innerText = gesture;

      const cmd = commandMap[gesture] || "S";

      if (cmd !== lastCommand && socket && socket.readyState === WebSocket.OPEN) {
        socket.send(cmd);
        lastCommand = cmd;
        console.log("Sent Command:", cmd);
      }
    } else {
      gestureLabel.innerText = "None";
    }

    window.requestAnimationFrame(predictLoop);
  }

  initWebSocket();
  setupAI();
</script>
